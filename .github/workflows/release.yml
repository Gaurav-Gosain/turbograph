name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: build and publish binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: cross-compile static binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            out="turbograph_${VERSION}_${os}_${arch}${ext}"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "$LDFLAGS" -o "dist/$out" ./cmd/turbograph
          done

      - name: generate SHA256SUMS
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
          generate_release_notes: true

  docker:
    name: build and push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/gaurav-gosain/turbograph
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Homebrew tap (optional, disabled by default).
  #
  # Publishing a formula to a tap requires an external repository
  # (e.g. Gaurav-Gosain/homebrew-tap) and a personal access token with
  # write access to it, which cannot be provisioned from this workflow with
  # only GITHUB_TOKEN. To enable a tap, either:
  #
  #   1. Add a GoReleaser config (.goreleaser.yaml) with a `brews:` block and
  #      run goreleaser/goreleaser-action here with a HOMEBREW_TAP_TOKEN secret, or
  #   2. Use a dedicated action such as `mislav/bump-homebrew-formula-action`
  #      with a token that can push to the tap repository.
  #
  # Left as a documented stub so the release pipeline never fails on a missing
  # secret.
