name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: [stable, oldstable]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: build
        run: go build ./...

      - name: build (pure stdlib, no SIMD)
        run: go build -tags noasm ./...

      - name: test
        run: go test -short ./...

      - name: test (race detector)
        if: matrix.os == 'ubuntu-latest' && matrix.go == 'stable'
        run: go test -short -race ./...

  vet-build:
    name: vet and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  benchmarks:
    name: benchmarks smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: build and run benchmarks once
        run: go test -run=^$ -bench=. -benchtime=1x ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  clients:
    name: client tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: python client tests
        working-directory: clients/python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m pytest -q

      - name: set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: clients/typescript/package-lock.json

      - name: typescript client tests
        working-directory: clients/typescript
        run: |
          npm ci
          npx tsc --noEmit
          node --test "test/**/*.test.mjs"
